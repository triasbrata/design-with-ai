<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyKitty — Design Review</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', system-ui, sans-serif; background: #FEF6E9; color: #2B2B2B; }
  .hidden { display: none !important; }

  /* ── Index ── */
  #index-page { padding: 40px 20px; max-width: 720px; margin: 0 auto; }
  #index-page h1 { font-size: 28px; text-align: center; margin-bottom: 4px; }
  #index-page .subtitle { color: #8A8075; margin-bottom: 32px; font-size: 14px; text-align: center; }
  .stats { display: flex; gap: 32px; justify-content: center; margin-bottom: 32px;
    padding: 16px; background: #FDFBF7; border-radius: 16px;
    box-shadow: 0 2px 8px rgba(120,88,72,0.08); }
  .stats div { text-align: center; }
  .stats .num { font-size: 32px; font-weight: 700; color: #C45353; }
  .stats .label { font-size: 12px; color: #8A8075; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 16px; text-align: left; }
  .tier-header td { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #C45353; padding-top: 24px; }
  #index-page a { color: #2B2B2B; text-decoration: none; font-size: 16px; border-bottom: 1px solid transparent; }
  #index-page a:hover { border-bottom-color: #C45353; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #F5EFE6; color: #8A8075; font-weight: 600; }
  .badge.extra { background: #FFEAE5; color: #C45353; }
  .tip { text-align: center; font-size: 12px; color: #8A8075; margin-top: 32px; }
  .shortcut { font-family: monospace; background: #F5EFE6; padding: 1px 6px; border-radius: 4px; }
  .capture-all-btn {
    display: block; margin: 24px auto 0; font-family: 'Nunito', system-ui, sans-serif;
    font-size: 13px; font-weight: 700; padding: 10px 32px;
    border-radius: 14px; border: none; cursor: pointer;
    background: #C45353; color: #fff; transition: background 0.15s;
  }
  .capture-all-btn:hover { background: #A84444; }
  .capture-all-btn:disabled { background: #D4A0A0; cursor: default; }

  /* ── Viewer ── */
  #viewer-page { display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #F5EDE0; user-select: none; }
  .toolbar { width: 100%; max-width: 980px; display: flex; align-items: center;
    justify-content: space-between; padding: 12px 16px;
    background: #FDFBF7; border-bottom: 1px solid #F2EBE0;
    position: sticky; top: 0; z-index: 10; }
  .toolbar .name { font-size: 14px; font-weight: 600; }
  .toolbar .pos { font-size: 11px; color: #8A8075; }
  .toolbar .tier-chip { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #EAE1D4; color: #8A8075; font-weight: 600; margin-left: 6px; }
  .nav-btn { background: #F5EFE6; border: none; color: #2B2B2B; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .nav-btn:hover { background: #EBE5DA; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .capture-btn { background: #C45353; color: #fff; border: none; font-family: 'Nunito', system-ui, sans-serif; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 10px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 4px; }
  .capture-btn:hover { background: #A84444; }
  .capture-btn:disabled { background: #D4A0A0; }
  .main-layout { display: flex; gap: 24px; padding: 16px 20px; max-width: 980px; width: 100%; align-items: flex-start; justify-content: center; }
  .frame-wrapper { flex-shrink: 0; border-radius: 28px; box-shadow: 0 8px 32px rgba(120,88,72,0.15); overflow: hidden; background: #fff; }
  iframe { border: none; display: block; width: 390px; height: 844px; }
  @media (max-height: 900px) { iframe { width: 340px; height: 735px; } }
  @media (max-height: 780px) { iframe { width: 300px; height: 650px; } }
  @media (max-width: 820px) { .main-layout { flex-direction: column; align-items: center; } }
  .meta-panel { flex: 1; min-width: 240px; max-width: 380px; background: #FDFBF7; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(120,88,72,0.06); align-self: flex-start; }
  .meta-section { margin-bottom: 16px; }
  .meta-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #C45353; letter-spacing: 0.5px; margin-bottom: 6px; }
  .meta-section p { font-size: 13px; line-height: 1.55; color: #4A4A4A; }
  .meta-section ul { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 4px; }
  .meta-section li { font-size: 12px; background: #F5EFE6; padding: 3px 10px; border-radius: 8px; color: #5A5A5A; }
  .meta-row { display: flex; flex-direction: column; gap: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
  .chip.state { background: #D4F5E4; color: #2D6A4F; }
  .chip.interaction { background: #FFF1D6; color: #8A6D3B; }
  .state-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .state-tab { font-family: 'Nunito', system-ui, sans-serif; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 12px; border: 1px solid #EBE5DA; background: #fff; color: #8A8075; cursor: pointer; transition: all 0.15s; }
  .state-tab:hover { background: #F5EFE6; color: #2B2B2B; }
  .state-tab.active { background: #C45353; color: #fff; border-color: #C45353; }
  .state-goal { margin-top: 10px; padding: 10px; background: #FFF9F5; border-radius: 10px; border-left: 3px solid #C45353; }
  .state-goal.hidden { display: none; }
  .state-goal p { font-size: 12px; color: #6B5E4F; line-height: 1.5; }
  a.home { color: #8A8075; text-decoration: none; font-size: 12px; margin-left: 8px; }
  a.home:hover { color: #C45353; }
  .footer-nav { display: flex; padding-bottom: 16px; gap: 0; }
  .footer-nav .nav-btn { width: auto; padding: 8px 20px; gap: 6px; font-size: 13px; font-weight: 600; border-radius: 12px; }
  .footer-nav .nav-btn:first-child { border-radius: 12px 0 0 12px; border-right: 1px solid #EBE5DA; }
  .footer-nav .nav-btn:last-child { border-radius: 0 12px 12px 0; }
  .shortcut-hint { font-size: 10px; color: #C2B8A8; text-align: center; padding-bottom: 12px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2B2B2B; color: #fff; font-size: 13px; font-weight: 600; padding: 10px 24px; border-radius: 12px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.ok { background: #2D6A4F; }
  .toast.err { background: #C45353; }
</style>
</head>
<body>

<!-- INDEX PAGE -->
<div id="index-page"></div>

<!-- VIEWER PAGE -->
<div id="viewer-page" class="hidden"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
// ── State ──
const TIERS = {
  T1: { label: 'Main User Flows', screens: ['record_screen_spec','transaction_list_screen_spec','add_transaction_screen_spec','wizard_add_transaction_screen_spec','bills_screen_spec','report_screen_spec','assets_screen_spec'] },
  T2: { label: 'Management', screens: ['category_manager_screen_spec','add_category_screen_spec','pocket_manager_screen_spec','add_pocket_screen_spec','ledger_manager_screen_spec','add_ledger_screen_spec'] },
  T3: { label: 'Settings & Security', screens: ['settings_screen_spec','theme_customizer_screen_spec','security_settings_screen_spec','pin_setup_screen_spec'] },
  T4: { label: 'Navigation & Shell', screens: ['floating_bottom_nav_spec','user_screen_spec'] }
};

let metadata = null;
let orderedScreens = [];
let currentIndex = -1;
let defaultDesc = '';
let defaultPurpose = '';
let stateContexts = {};

function screenName(f) {
  return f.replace(/_screen_spec$/,'').replace(/_spec$/,'').replace(/_/g,' ')
    .replace(/\b\w/g, c => c.toUpperCase())
    .replace('Add ','Add/Edit ').replace('Wizard Add Transaction','Wizard: Add Transaction')
    .replace('Floating Bottom Nav','Floating Bottom Nav (shell)').replace('Pin Setup','PIN Setup/Change');
}

// ── Toast ──
function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Capture ──
async function captureScreen(filename) {
  const iframe = document.getElementById('phone-frame');
  if (!iframe?.contentDocument?.body) { toast('Iframe not ready', false); return; }
  try {
    const canvas = await html2canvas(iframe.contentDocument.body, {
      width: 390, height: 844, scale: 2,
      backgroundColor: '#ffffff', useCORS: true, allowTaint: true,
    });
    const dataUrl = canvas.toDataURL('image/png');
    // Also trigger download
    const a = document.createElement('a');
    a.href = dataUrl; a.download = filename; a.click();
    // POST to save
    const res = await fetch('/api/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, data: dataUrl }),
    });
    const result = await res.json();
    toast(result.ok ? `Saved: ${result.path}` : `Save failed: ${result.error}`, result.ok);
  } catch (e) {
    toast('Capture failed: ' + e.message, false);
  }
}

async function captureAll() {
  const btn = document.querySelector('.capture-all-btn');
  btn.disabled = true; btn.textContent = 'Capturing...';
  for (let i = 0; i < orderedScreens.length; i++) {
    btn.textContent = `Capturing ${i + 1}/${orderedScreens.length}...`;
    showViewer(i);
    await new Promise(r => setTimeout(r, 600)); // wait for iframe load
    await captureScreen(orderedScreens[i] + '.png');
  }
  btn.textContent = '📷 Capture All';
  btn.disabled = false;
  toast(`Done! ${orderedScreens.length} screenshots saved.`);
}

window.captureScreen = () => captureScreen(orderedScreens[currentIndex] + '.png');
window.captureAll = captureAll;

// ── State Tabs ──
let currentState = 'default';

function sendStateToIframe(key) {
  const iframe = document.getElementById('phone-frame');
  if (iframe?.contentWindow) {
    iframe.contentWindow.postMessage({ type: 'setState', state: key }, '*');
  }
  currentState = key;
}

// Called when iframe finishes loading — re-apply current state
function onIframeLoad() {
  if (currentState !== 'default') {
    // Small delay to let the iframe's own JS initialize
    setTimeout(() => sendStateToIframe(currentState), 200);
  }
}
window.onIframeLoad = onIframeLoad;

function showState(key) {
  document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.state-tab[data-state="${key}"]`);
  if (tab) tab.classList.add('active');
  const descEl = document.getElementById('meta-desc');
  const purposeEl = document.getElementById('meta-purpose');
  const goalDiv = document.getElementById('state-goal');
  const goalText = document.getElementById('state-goal-text');
  if (key === 'default' || !stateContexts[key]) {
    descEl.textContent = defaultDesc;
    purposeEl.textContent = defaultPurpose;
    if (goalDiv) goalDiv.classList.add('hidden');
  } else {
    const ctx = stateContexts[key];
    descEl.textContent = ctx.description;
    purposeEl.textContent = ctx.description;
    if (goalDiv && ctx.goal) {
      goalDiv.classList.remove('hidden');
      goalText.textContent = ctx.goal;
    }
  }
  // Sync iframe HTML state
  sendStateToIframe(key);
}
window.showState = showState;

// ── Navigation ──
function goPrev() { if (currentIndex > 0) showViewer(currentIndex - 1); }
function goNext() { if (currentIndex < orderedScreens.length - 1) showViewer(currentIndex + 1); }
window.goPrev = goPrev;
window.goNext = goNext;

// ── Render Index ──
async function renderIndex() {
  // Load metadata
  try {
    const res = await fetch('/screens/screen-metadata.json');
    metadata = await res.json();
  } catch(e) { metadata = { screens: {}, components: {} }; }

  // Build ordered list
  orderedScreens = [];
  const existing = Object.keys(metadata.screens);
  for (const tier of Object.values(TIERS)) {
    for (const s of tier.screens) {
      if (existing.includes(s)) orderedScreens.push(s);
    }
  }
  // Add untiered
  for (const s of existing) {
    if (!orderedScreens.includes(s)) orderedScreens.push(s);
  }

  const indexPage = document.getElementById('index-page');
  const viewerPage = document.getElementById('viewer-page');
  indexPage.classList.remove('hidden');
  viewerPage.classList.add('hidden');
  document.title = 'MoneyKitty — Design Review';

  let tierRows = '';
  for (const [tier, { label, screens }] of Object.entries(TIERS)) {
    const ex = screens.filter(s => existing.includes(s));
    if (!ex.length) continue;
    tierRows += `<tr class="tier-header"><td colspan="2">${tier} — ${label}</td></tr>`;
    for (const s of ex) {
      tierRows += `<tr><td><a href="?file=${s}" onclick="event.preventDefault();showViewerByName('${s}')">${screenName(s)}</a></td><td><span class="badge">${tier}</span></td></tr>`;
    }
  }

  const allTiered = Object.values(TIERS).flatMap(t => t.screens);
  const untiered = orderedScreens.filter(s => !allTiered.includes(s));
  if (untiered.length) {
    tierRows += `<tr class="tier-header"><td colspan="2">UNCATEGORIZED</td></tr>`;
    for (const s of untiered) {
      tierRows += `<tr><td><a href="?file=${s}" onclick="event.preventDefault();showViewerByName('${s}')">${screenName(s)}</a></td><td><span class="badge extra">EXTRA</span></td></tr>`;
    }
  }

  indexPage.innerHTML = `
    <h1>MoneyKitty — Design Review</h1>
    <p class="subtitle">Golden Baseline Screens — click to view in phone frame with prev/next</p>
    <div class="stats">
      <div><div class="num">${orderedScreens.length}</div><div class="label">Screens</div></div>
      <div><div class="num">4</div><div class="label">Tiers</div></div>
      <div><div class="num">:4200</div><div class="label">Port</div></div>
    </div>
    <table>${tierRows}</table>
    <button class="capture-all-btn" onclick="captureAll()">📷 Capture All Screens</button>
    <p class="tip">Click any screen to open viewer with phone-sized iframe. Use <span class="shortcut">←</span> <span class="shortcut">→</span> or prev/next buttons to navigate.</p>
  `;
}

// ── Render Viewer ──
function showViewerByName(name) {
  const idx = orderedScreens.indexOf(name);
  if (idx >= 0) showViewer(idx);
}
window.showViewerByName = showViewerByName;

function showViewer(idx) {
  currentIndex = idx;
  currentState = 'default'; // reset on screen change
  const screen = orderedScreens[idx];
  const meta = metadata?.screens?.[screen];
  const total = orderedScreens.length;
  const prev = idx > 0 ? orderedScreens[idx - 1] : null;
  const next = idx < total - 1 ? orderedScreens[idx + 1] : null;
  const name = screenName(screen);
  defaultDesc = meta?.description ?? '';
  defaultPurpose = meta?.purpose ?? '';
  stateContexts = meta?.stateContext ?? {};

  document.getElementById('index-page').classList.add('hidden');
  const vp = document.getElementById('viewer-page');
  vp.classList.remove('hidden');
  document.title = name + ' — Review';
  // Update URL
  history.replaceState({}, '', '?file=' + screen);

  let stateTabsHtml = '';
  if (Object.keys(stateContexts).length > 0) {
    stateTabsHtml = `
    <div class="meta-section">
      <div class="meta-label">State Context <span style="font-weight:400;color:#8A8075">— click a state</span></div>
      <div class="state-tabs" id="state-tabs">
        <button class="state-tab active" data-state="default" onclick="showState('default')">Overview</button>
        ${Object.entries(stateContexts).map(([k, c]) =>
          `<button class="state-tab" data-state="${k}" onclick="showState('${k}')">${c.label}</button>`
        ).join('')}
      </div>
      <div id="state-goal" class="state-goal hidden">
        <div class="meta-label">Goal</div>
        <p id="state-goal-text"></p>
      </div>
    </div>`;
  }

  const metaPanelHtml = meta ? `
  <div class="meta-panel">
    ${stateTabsHtml}
    <div class="meta-section">
      <div class="meta-label">Description</div>
      <p id="meta-desc">${meta.description}</p>
    </div>
    <div class="meta-section">
      <div class="meta-label">Purpose</div>
      <p id="meta-purpose">${meta.purpose}</p>
    </div>
    <div class="meta-section">
      <div class="meta-label">Key Elements</div>
      <ul>${meta.keyElements.map(e => `<li>${e}</li>`).join('')}</ul>
    </div>
    <div class="meta-row">
      <div class="meta-chip-group">
        <div class="meta-label">States</div>
        <div class="chips">${meta.states.map(s => `<span class="chip state">${s}</span>`).join('')}</div>
      </div>
      <div class="meta-chip-group">
        <div class="meta-label">Interactions</div>
        <div class="chips">${meta.interactions.map(i => `<span class="chip interaction">${i}</span>`).join('')}</div>
      </div>
    </div>
  </div>` : '';

  vp.innerHTML = `
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:8px">
      <a class="home" href="/" onclick="event.preventDefault();renderIndex()">← Index</a>
    </div>
    <div style="text-align:center">
      <div class="name">${name}<span class="tier-chip">${meta?.tier ?? ''}</span></div>
      <div class="pos">${idx + 1} of ${total}</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="capture-btn" onclick="captureScreen('${screen}.png')">📷 Capture</button>
      <button class="nav-btn" onclick="goPrev()"${prev ? '' : ' disabled'}>◀</button>
      <button class="nav-btn" onclick="goNext()"${next ? '' : ' disabled'}>▶</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="frame-wrapper">
      <iframe src="/screens/${screen}.html" id="phone-frame" sandbox="allow-scripts allow-same-origin" onload="onIframeLoad()"></iframe>
    </div>
    ${metaPanelHtml}
  </div>
  <div class="footer-nav">
    <button class="nav-btn" onclick="goPrev()"${prev ? '' : ' disabled'}>◀ Prev</button>
    <button class="nav-btn" onclick="goNext()"${next ? '' : ' disabled'}>Next ▶</button>
  </div>
  <p class="shortcut-hint">Arrow keys ← → to navigate &nbsp;|&nbsp; Esc back to index</p>
  `;
}

// ── Init ──
document.addEventListener('keydown', (e) => {
  if (document.getElementById('viewer-page').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  if (e.key === 'Escape') { renderIndex(); }
});

// Route: check ?file= param
const params = new URLSearchParams(location.search);
const fileParam = params.get('file');
if (fileParam) {
  renderIndex().then(() => {
    const idx = orderedScreens.indexOf(fileParam);
    if (idx >= 0) showViewer(idx);
  });
} else {
  renderIndex();
}
</script>
</body>
</html>
