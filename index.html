<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyKitty — Design Review</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',system-ui,sans-serif; background:#F5EDE0; color:#2B2B2B; display:flex; height:100vh; overflow:hidden; }
  .hidden { display:none !important; }

  /* ── Sidebar ── */
  #sidebar {
    width:240px; min-width:240px; height:100vh; overflow-y:auto;
    background:#FDFBF7; border-right:1px solid #F2EBE0;
    padding:16px 12px; user-select:none;
  }
  #sidebar h3 { font-size:13px; font-weight:700; margin-bottom:4px; }
  #sidebar .sub { font-size:10px; color:#8A8075; margin-bottom:16px; }
  .tier-group { margin-bottom:12px; }
  .tier-label { font-size:9px; font-weight:700; text-transform:uppercase; color:#C45353; padding:4px 0 2px; letter-spacing:0.5px; }
  .side-link {
    display:block; font-size:12px; padding:5px 10px; border-radius:8px;
    color:#4A4A4A; text-decoration:none; cursor:pointer;
    transition:background 0.1s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .side-link:hover { background:#F5EFE6; }
  .side-link.active { background:#FFEAE5; color:#C45353; font-weight:600; }
  .sidebar-toggle {
    position:fixed; left:244px; top:12px; z-index:20;
    width:24px; height:24px; border-radius:6px; border:1px solid #EBE5DA;
    background:#FDFBF7; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;
    transition:left 0.25s;
  }
  #sidebar.collapsed + .sidebar-toggle { left:0; }
  #sidebar.collapsed { margin-left:-240px; }

  /* ── Main Content ── */
  #main-content { flex:1; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:auto; user-select:none; }

  .toolbar { width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px 10px 40px; background:#FDFBF7; border-bottom:1px solid #F2EBE0;
    position:sticky; top:0; z-index:10; }
  .toolbar .name { font-size:14px; font-weight:600; }
  .toolbar .pos { font-size:11px; color:#8A8075; }
  .toolbar .tier-chip { font-size:10px; padding:2px 8px; border-radius:10px; background:#EAE1D4; color:#8A8075; font-weight:600; margin-left:6px; }
  .nav-btn { background:#F5EFE6; border:none; color:#2B2B2B; width:36px; height:36px; border-radius:10px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .nav-btn:hover { background:#EBE5DA; }
  .nav-btn:disabled { opacity:0.3; cursor:default; }
  .capture-btn { background:#C45353; color:#fff; border:none; font-family:'Nunito',system-ui,sans-serif; font-size:11px; font-weight:700; padding:6px 14px; border-radius:10px; cursor:pointer; transition:background 0.15s; display:flex; align-items:center; gap:4px; }
  .capture-btn:hover { background:#A84444; }
  .capture-btn:disabled { background:#D4A0A0; }

  .main-layout { display:flex; gap:20px; padding:12px 16px; flex:1; align-items:flex-start; justify-content:center; width:100%; }
  .frame-wrapper { flex-shrink:0; border-radius:28px; box-shadow:0 8px 32px rgba(120,88,72,0.15); overflow:hidden; background:#fff; }
  iframe { border:none; display:block; width:390px; height:844px; }
  @media (max-height:900px) { iframe { width:340px; height:735px; } }
  @media (max-height:780px) { iframe { width:300px; height:650px; } }
  @media (max-width:1100px) {
    .main-layout { flex-direction:column; align-items:center; }
  }
  .meta-panel { flex:1; min-width:200px; max-width:340px; background:#FDFBF7; border-radius:16px; padding:16px; box-shadow:0 2px 8px rgba(120,88,72,0.06); align-self:flex-start; max-height:calc(100vh - 80px); overflow-y:auto; }
  .meta-section { margin-bottom:12px; }
  .meta-label { font-size:10px; font-weight:700; text-transform:uppercase; color:#C45353; letter-spacing:0.5px; margin-bottom:4px; }
  .meta-section p { font-size:12px; line-height:1.5; color:#4A4A4A; }
  .meta-section ul { list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:3px; }
  .meta-section li { font-size:11px; background:#F5EFE6; padding:2px 8px; border-radius:6px; color:#5A5A5A; }
  .meta-row { display:flex; flex-direction:column; gap:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:3px; }
  .chip { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; }
  .chip.state { background:#D4F5E4; color:#2D6A4F; }
  .chip.interaction { background:#FFF1D6; color:#8A6D3B; }
  .state-tabs { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:6px; }
  .state-tab { font-family:'Nunito',system-ui,sans-serif; font-size:10px; font-weight:600; padding:3px 10px; border-radius:10px; border:1px solid #EBE5DA; background:#fff; color:#8A8075; cursor:pointer; transition:all 0.15s; }
  .state-tab:hover { background:#F5EFE6; color:#2B2B2B; }
  .state-tab.active { background:#C45353; color:#fff; border-color:#C45353; }
  .state-goal { margin-top:8px; padding:8px; background:#FFF9F5; border-radius:8px; border-left:3px solid #C45353; }
  .state-goal.hidden { display:none; }
  .state-goal p { font-size:11px; color:#6B5E4F; line-height:1.4; }
  .footer-nav { display:flex; padding-bottom:12px; gap:0; }
  .footer-nav .nav-btn { width:auto; padding:6px 16px; gap:4px; font-size:12px; font-weight:600; border-radius:10px; }
  .footer-nav .nav-btn:first-child { border-radius:10px 0 0 10px; border-right:1px solid #EBE5DA; }
  .footer-nav .nav-btn:last-child { border-radius:0 10px 10px 0; }
  .shortcut-hint { font-size:9px; color:#C2B8A8; text-align:center; padding-bottom:8px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#2B2B2B; color:#fff; font-size:12px; font-weight:600; padding:8px 20px; border-radius:10px; opacity:0; transition:opacity 0.25s; pointer-events:none; z-index:100; }
  .toast.show { opacity:1; }
  .toast.ok { background:#2D6A4F; }
  .toast.err { background:#C45353; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar"></nav>
<div class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</div>

<!-- MAIN -->
<div id="main-content"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
const TIERS = {
  T1: { label:'Main User Flows', screens:['record_screen_spec','transaction_list_screen_spec','add_transaction_screen_spec','wizard_add_transaction_screen_spec','bills_screen_spec','report_screen_spec','assets_screen_spec'] },
  T2: { label:'Management', screens:['category_manager_screen_spec','add_category_screen_spec','pocket_manager_screen_spec','add_pocket_screen_spec','ledger_manager_screen_spec','add_ledger_screen_spec'] },
  T3: { label:'Settings & Security', screens:['settings_screen_spec','theme_customizer_screen_spec','security_settings_screen_spec','pin_setup_screen_spec'] },
  T4: { label:'Navigation & Shell', screens:['floating_bottom_nav_spec','user_screen_spec'] }
};

let metadata = null;
let orderedScreens = [];
let currentIndex = -1;
let currentScreen = '';
let defaultDesc = '';
let defaultPurpose = '';
let stateContexts = {};
let currentState = 'default';

function screenName(f) {
  return f.replace(/_screen_spec$/,'').replace(/_spec$/,'').replace(/_/g,' ')
    .replace(/\b\w/g, c => c.toUpperCase())
    .replace('Add ','Add/Edit ').replace('Wizard Add Transaction','Wizard: Add Transaction')
    .replace('Floating Bottom Nav','Floating Bottom Nav (shell)').replace('Pin Setup','PIN Setup/Change');
}

// ── Sidebar Toggle ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
window.toggleSidebar = toggleSidebar;

// ── Toast ──
function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Sidebar ──
function renderSidebar(activeScreen) {
  const existing = Object.keys(metadata?.screens || {});
  let html = '<h3>Design Review</h3><p class="sub">' + orderedScreens.length + ' screens</p>';
  for (const [tier, { label, screens }] of Object.entries(TIERS)) {
    const ex = screens.filter(s => existing.includes(s));
    if (!ex.length) continue;
    html += '<div class="tier-group"><div class="tier-label">' + tier + ' — ' + label + '</div>';
    for (const s of ex) {
      const active = s === activeScreen ? ' active' : '';
      html += '<a class="side-link' + active + '" onclick="selectScreen(\'' + s + '\')" title="' + screenName(s) + '">' + screenName(s) + '</a>';
    }
    html += '</div>';
  }
  document.getElementById('sidebar').innerHTML = html;
}

function highlightSidebar(screen) {
  document.querySelectorAll('.side-link').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.side-link').forEach(a => {
    if (a.getAttribute('onclick')?.includes(screen)) a.classList.add('active');
  });
}

function selectScreen(name) {
  const idx = orderedScreens.indexOf(name);
  if (idx >= 0) showViewer(idx);
}
window.selectScreen = selectScreen;

// ── Capture ──
async function captureScreen(filename) {
  const iframe = document.getElementById('phone-frame');
  if (!iframe?.contentDocument?.body) { toast('Iframe not ready', false); return; }
  try {
    const canvas = await html2canvas(iframe.contentDocument.body, {
      width:390, height:844, scale:2,
      backgroundColor:'#ffffff', useCORS:true, allowTaint:true,
    });
    const dataUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataUrl; a.download = filename; a.click();
    const res = await fetch('/api/capture', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ filename, data:dataUrl }),
    });
    const result = await res.json();
    toast(result.ok ? `Saved: ${result.path}` : `Save failed: ${result.error}`, result.ok);
  } catch (e) {
    toast('Capture failed: ' + e.message, false);
  }
}
window.captureScreen = () => captureScreen(orderedScreens[currentIndex] + (currentState !== 'default' ? '_' + currentState : '') + '.png');

// ── State Tabs ──
function sendStateToIframe(key) {
  const iframe = document.getElementById('phone-frame');
  if (iframe?.contentWindow) {
    iframe.contentWindow.postMessage({ type:'setState', state:key }, '*');
  }
  currentState = key;
}

function onIframeLoad() {
  if (currentState !== 'default') {
    const iframe = document.getElementById('phone-frame');
    const hasContract = !!iframe?.contentWindow?.__baseline?.setState;
    if (hasContract) {
      // Contract-compliant baseline — re-apply state via postMessage
      setTimeout(() => sendStateToIframe(currentState), 200);
    }
    // Non-compliant baselines: variant-file URL already shows correct state
  }
}
window.onIframeLoad = onIframeLoad;

function showState(key) {
  document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.state-tab[data-state="${key}"]`);
  if (tab) tab.classList.add('active');
  const descEl = document.getElementById('meta-desc');
  const purposeEl = document.getElementById('meta-purpose');
  const goalDiv = document.getElementById('state-goal');
  const goalText = document.getElementById('state-goal-text');
  if (key === 'default' || !stateContexts[key]) {
    descEl.textContent = defaultDesc;
    purposeEl.textContent = defaultPurpose;
    if (goalDiv) goalDiv.classList.add('hidden');
  } else {
    const ctx = stateContexts[key];
    descEl.textContent = ctx.description;
    purposeEl.textContent = ctx.description;
    if (goalDiv && ctx.goal) {
      goalDiv.classList.remove('hidden');
      goalText.textContent = ctx.goal;
    }
  }
  currentState = key;

  const iframe = document.getElementById('phone-frame');
  if (!iframe || !currentScreen) return;

  // Approach 1: postMessage for contract-compliant baselines (no reload)
  // Skip 'default' — baselines use 'data'/'add'/'setup' etc. as first state, not 'default'
  const hasContract = !!iframe.contentWindow?.__baseline?.setState;
  if (hasContract && key !== 'default') {
    sendStateToIframe(key);
    return;
  }

  // Approach 2: load state-variant file for non-compliant baselines
  const meta = metadata?.screens?.[currentScreen];
  const states = meta?.states || [];
  if (key === 'default' || key === states[0]) {
    iframe.src = `/screens/${currentScreen}.html`;
  } else {
    iframe.src = `/screens/${currentScreen}_${key}.html`;
  }
}
window.showState = showState;

// ── Navigation ──
function goPrev() {
  if (currentIndex === -2) { showViewer(orderedScreens.length - 1); return; }
  if (currentIndex > 0) showViewer(currentIndex - 1);
}
function goNext() {
  if (currentIndex === orderedScreens.length - 1) { showSummary(); return; }
  if (currentIndex >= 0 && currentIndex < orderedScreens.length - 1) showViewer(currentIndex + 1);
}
window.goPrev = goPrev;
window.goNext = goNext;

// ── Render Viewer ──
function showViewer(idx) {
  currentIndex = idx;
  currentState = 'default';
  const screen = orderedScreens[idx];
  currentScreen = screen;
  const meta = metadata?.screens?.[screen];
  const total = orderedScreens.length;
  const prev = idx > 0 ? orderedScreens[idx - 1] : null;
  const next = idx < total - 1 ? orderedScreens[idx + 1] : null;
  const name = screenName(screen);
  defaultDesc = meta?.description ?? '';
  defaultPurpose = meta?.purpose ?? '';
  stateContexts = meta?.stateContext ?? {};

  highlightSidebar(screen);
  document.title = name + ' — Review';
  history.replaceState({}, '', '?file=' + screen);

  let stateTabsHtml = '';
  if (Object.keys(stateContexts).length > 0) {
    stateTabsHtml = `
    <div class="meta-section">
      <div class="meta-label">State Context <span style="font-weight:400;color:#8A8075">— click a state</span></div>
      <div class="state-tabs" id="state-tabs">
        <button class="state-tab active" data-state="default" onclick="showState('default')">Overview</button>
        ${Object.entries(stateContexts).map(([k, c]) =>
          `<button class="state-tab" data-state="${k}" onclick="showState('${k}')">${c.label}</button>`
        ).join('')}
      </div>
      <div id="state-goal" class="state-goal hidden">
        <div class="meta-label">Goal</div>
        <p id="state-goal-text"></p>
      </div>
    </div>`;
  }

  const metaPanelHtml = meta ? `
  <div class="meta-panel">
    ${stateTabsHtml}
    <div class="meta-section">
      <div class="meta-label">Description</div>
      <p id="meta-desc">${meta.description}</p>
    </div>
    <div class="meta-section">
      <div class="meta-label">Purpose</div>
      <p id="meta-purpose">${meta.purpose}</p>
    </div>
    <div class="meta-section">
      <div class="meta-label">Key Elements</div>
      <ul>${meta.keyElements.map(e => `<li>${e}</li>`).join('')}</ul>
    </div>
    <div class="meta-row">
      <div class="meta-chip-group">
        <div class="meta-label">States</div>
        <div class="chips">${meta.states.map(s => `<span class="chip state">${s}</span>`).join('')}</div>
      </div>
      <div class="meta-chip-group">
        <div class="meta-label">Interactions</div>
        <div class="chips">${meta.interactions.map(i => `<span class="chip interaction">${i}</span>`).join('')}</div>
      </div>
    </div>
  </div>` : '';

  document.getElementById('main-content').innerHTML = `
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:#8A8075">${idx + 1}/${total}</span>
    </div>
    <div style="text-align:center">
      <div class="name">${name}<span class="tier-chip">${meta?.tier ?? ''}</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="capture-btn" onclick="window.captureScreen()">📷 Capture</button>
      <button class="nav-btn" onclick="goPrev()"${prev ? '' : ' disabled'}>◀</button>
      <button class="nav-btn" onclick="goNext()"${next ? '' : ' disabled'}>▶</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="frame-wrapper">
      <iframe src="/screens/${screen}.html" id="phone-frame" sandbox="allow-scripts allow-same-origin" onload="onIframeLoad()"></iframe>
    </div>
    ${metaPanelHtml}
  </div>
  <div class="footer-nav">
    <button class="nav-btn" onclick="goPrev()"${prev ? '' : ' disabled'}>◀ Prev</button>
    <button class="nav-btn" onclick="goNext()"${next ? '' : ' disabled'}>Next ▶</button>
  </div>
  <p class="shortcut-hint">Arrow keys ← → to navigate &nbsp;|&nbsp; Esc to reset &nbsp;|&nbsp; \ to toggle sidebar</p>
  `;
}

// ── Init ──
async function init() {
  try {
    const res = await fetch('/screens/screen-metadata.json');
    metadata = await res.json();
  } catch(e) { metadata = { screens:{}, components:{} }; }

  const existing = Object.keys(metadata.screens);
  orderedScreens = [];
  for (const tier of Object.values(TIERS)) {
    for (const s of tier.screens) {
      if (existing.includes(s)) orderedScreens.push(s);
    }
  }
  for (const s of existing) {
    if (!orderedScreens.includes(s)) orderedScreens.push(s);
  }

  if (!orderedScreens.length) {
    document.getElementById('main-content').innerHTML = '<div style="padding:40px;text-align:center"><h1>No screens found</h1><p>Check GOLDEN_DIR and screen-metadata.json</p></div>';
    return;
  }

  // Route: ?file= param or default to record_screen_spec
  const params = new URLSearchParams(location.search);
  const fileParam = params.get('file');
  const target = fileParam && orderedScreens.includes(fileParam) ? fileParam : orderedScreens[0];
  const idx = orderedScreens.indexOf(target);

  renderSidebar(target);
  showViewer(idx);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  if (e.key === 'Escape') { history.pushState({}, '', '/'); location.reload(); }
  if (e.key === '\\') { e.preventDefault(); toggleSidebar(); }
});

// Init on load
init();
</script>
</body>
</html>
